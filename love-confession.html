<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>520告白</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100%;
            font-family: 'Ma Shan Zheng', cursive, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 心形飘落动画容器 */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            top: -50px;
            animation: fall linear forwards;
            opacity: 0.8;
        }

        .heart::before {
            content: '';
            display: block;
            width: 20px;
            height: 20px;
            background: currentColor;
            transform: rotate(-45deg);
            border-radius: 50% 50% 0 0;
        }

        .heart::after {
            content: '';
            position: absolute;
            top: -10px;
            left: 0;
            width: 20px;
            height: 20px;
            background: currentColor;
            border-radius: 50% 50% 0 0;
            transform: rotate(45deg);
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) rotate(360deg) scale(0.5);
                opacity: 0.3;
            }
        }

        /* 主内容区 */
        .main-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px;
        }

        .title {
            font-size: 72px;
            color: #e74c3c;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            margin-bottom: 40px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .heart-icon {
            font-size: 100px;
            color: #e74c3c;
            animation: heartbeat 1s ease-in-out infinite;
            margin-bottom: 30px;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.15); }
        }

        .message-box {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 40px 50px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .typewriter {
            font-size: 28px;
            color: #c0392b;
            line-height: 1.8;
            min-height: 200px;
            white-space: pre-wrap;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 28px;
            background: #e74c3c;
            margin-left: 5px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .date {
            margin-top: 30px;
            font-size: 24px;
            color: #e74c3c;
            opacity: 0;
            transition: opacity 1s;
        }

        .date.show {
            opacity: 1;
        }

        /* 导航按钮 */
        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
            opacity: 0;
            transition: opacity 1s;
        }

        .nav-buttons.show {
            opacity: 1;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(231, 76, 60, 0.3);
            background: #fff;
        }

        .nav-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .nav-text {
            font-size: 16px;
            color: #c0392b;
            font-family: 'Ma Shan Zheng', cursive;
        }

        /* 开始按钮 */
        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 0.5s;
        }

        .start-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .start-heart {
            font-size: 120px;
            color: #e74c3c;
            animation: heartbeat 1s ease-in-out infinite;
            margin-bottom: 30px;
        }

        .start-text {
            font-size: 36px;
            color: #c0392b;
            margin-bottom: 20px;
        }

        .start-hint {
            font-size: 18px;
            color: #e74c3c;
            opacity: 0.7;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .title { font-size: 48px; }
            .typewriter { font-size: 20px; }
            .message-box { padding: 30px; margin: 0 20px; }
            .heart-icon { font-size: 70px; }
        }
    </style>
</head>
<body>
    <!-- 开始覆盖层 -->
    <div class="start-overlay" id="startOverlay">
        <div class="start-heart">❤</div>
        <div class="start-text">520告白</div>
        <div class="start-hint">点击开启这份心意</div>
    </div>

    <!-- 心形飘落容器 -->
    <div class="hearts-container" id="heartsContainer"></div>

    <!-- 主内容 -->
    <div class="main-container">
        <div class="title">致 最 爱 的 你</div>
        <div class="heart-icon">❤</div>
        <div class="message-box">
            <div class="typewriter" id="typewriter"></div>
            <span class="cursor" id="cursor"></span>
        </div>
        <div class="date" id="date">2026.05.20</div>

        <div class="nav-buttons" id="navButtons">
            <a href="file:///C:/claude-code-demo/video-player.html" class="nav-btn">
                <span class="nav-icon">📷</span>
                <span class="nav-text">照片墙</span>
            </a>
            <a href="file:///C:/claude-code-demo/video-player.html" class="nav-btn">
                <span class="nav-icon">📅</span>
                <span class="nav-text">纪念日</span>
            </a>
            <a href="file:///C:/claude-code-demo/video-player.html" class="nav-btn">
                <span class="nav-icon">🎬</span>
                <span class="nav-text">我们的视频</span>
            </a>
            <a href="file:///C:/claude-code-demo/video-player.html" class="nav-btn">
                <span class="nav-icon">💌</span>
                <span class="nav-text">更多情话</span>
            </a>
        </div>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop>
        <source src="https://music.163.com/song/media/outer/url?id=1815682584.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 配置
        const messages = [
            "遇见你，是最美的意外",
            "",
            "从相识到相知，",
            "从相知到相爱，",
            "每一天都因为有你而精彩。",
            "",
            "你的笑容，是我见过最美的风景；",
            "你的声音，是我听过最动听的旋律；",
            "你的存在，让我的世界变得完整。",
            "",
            "往后余生，",
            "风雪是你，平淡是你，",
            "清贫是你，荣华是你，",
            "心底温柔是你，目光所至也是你。",
            "",
            "520，我爱你。"
        ];

        // 元素引用
        const startOverlay = document.getElementById('startOverlay');
        const heartsContainer = document.getElementById('heartsContainer');
        const typewriter = document.getElementById('typewriter');
        const cursor = document.getElementById('cursor');
        const dateEl = document.getElementById('date');
        const bgMusic = document.getElementById('bgMusic');

        // 心形颜色
        const heartColors = [
            '#e74c3c', '#ff6b81', '#ff4757',
            '#ff6b6b', '#ee5a24', '#ff7979',
            '#ffb8b8', '#ff9ff3', '#f368e0'
        ];

        // 创建飘落的心形
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.color = heartColors[Math.floor(Math.random() * heartColors.length)];
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';

            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        // 打字机效果
        async function typeMessage() {
            let fullText = messages.join('\n');
            let index = 0;

            cursor.style.display = 'inline-block';

            while (index < fullText.length) {
                typewriter.textContent += fullText[index];
                index++;

                if (fullText[index - 1] === '\n' || fullText[index - 1] === '，' || fullText[index - 1] === '。') {
                    await sleep(300);
                } else {
                    await sleep(100 + Math.random() * 50);
                }
            }

            cursor.style.display = 'none';
            dateEl.classList.add('show');
            document.querySelector('.nav-buttons').classList.add('show');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 开始
        startOverlay.addEventListener('click', async function() {
            console.log('点击已触发');

            // 隐藏开始界面
            startOverlay.classList.add('hidden');

            // 开始飘落心形
            setInterval(createHeart, 300);

            // 延迟后开始打字
            setTimeout(typeMessage, 500);

            // 播放音乐（可能在某些浏览器失败）
            bgMusic.volume = 0.5;
            try {
                await bgMusic.play();
                console.log('音乐播放成功');
            } catch(e) {
                console.log('音乐播放失败:', e);
                console.log('请尝试在其他浏览器中打开，或启动本地服务器');
            }
        });
    </script>
</body>
</html>
