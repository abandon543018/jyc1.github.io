<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .video-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
            cursor: pointer;
            z-index: 10;
        }

        .play-button {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }

        .play-button:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.5);
        }

        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 40px solid white;
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            margin-left: 10px;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: Arial, sans-serif;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="video" loop>
            <source src="D:\Program Files\JiJiDown\Download\【官方 MV】Never Gonna Give You Up - Rick Astley\1.Never Gonna Give You Up - Rick Astley(Av80433022,P1).mp4" type="video/mp4">
            您的浏览器不支持视频播放
        </video>
        <div class="play-overlay" id="overlay">
            <div class="play-button"></div>
            <p class="instructions">点击播放并进入全屏</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');

        overlay.addEventListener('click', async function() {
            overlay.style.display = 'none';

            try {
                // 请求全屏
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    await document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) {
                    await document.documentElement.msRequestFullscreen();
                }
            } catch (e) {
                console.log('全屏请求失败:', e);
            }

            // 播放视频
            video.play();
        });

        // ESC 退出全屏时暂停
        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement) {
                video.pause();
                overlay.style.display = 'flex';
            }
        });

        document.addEventListener('webkitfullscreenchange', function() {
            if (!document.webkitFullscreenElement) {
                video.pause();
                overlay.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
